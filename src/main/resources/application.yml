server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: multi-agent-assistant

logging:
  level:
    com.assistant.multiagent: INFO
    org.springframework.web: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"

app:
  nvidia:
    api-key: ${NVIDIA_API_KEY}
    api-url: ${NVIDIA_API_URL:https://integrate.api.nvidia.com/v1/chat/completions}
    model: ${NVIDIA_MODEL:google/gemma-4-31b-it}
  request:
    timeout-seconds: ${REQUEST_TIMEOUT_SECONDS:60}
